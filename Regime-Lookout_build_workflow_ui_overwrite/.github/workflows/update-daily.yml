name: Update Daily Data (EOD)

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - "scripts/**"
      - ".github/workflows/update-daily.yml"
  schedule:
    # Hourly; gate below will skip before close.
    - cron: "15 * * * *"

permissions:
  contents: write

concurrency:
  group: update-daily
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "requirements.txt"

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Gate: skip unless after US market close (ET)
        id: gate
        continue-on-error: true
        shell: bash
        run: |
          python - <<'PY'
          import datetime
          import sys
          from zoneinfo import ZoneInfo

          et = ZoneInfo("America/New_York")
          now = datetime.datetime.now(tz=et)

          # Weekend: allow update any time
          if now.weekday() >= 5:
              sys.exit(0)

          # Weekday: allow after 16:15 ET
          if (now.hour, now.minute) >= (16, 15):
              sys.exit(0)

          # Otherwise: gate (non-zero)
          sys.exit(2)
          PY

      - name: Stop if gated
        if: steps.gate.outcome != 'success'
        run: echo "Gated. Skipping update." && exit 0

      - name: Build daily_latest.json
        run: node scripts/fetch_daily.js

      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/daily_latest.json
          git diff --cached --quiet || git commit -m "data(daily): refresh daily_latest.json"
          git push
