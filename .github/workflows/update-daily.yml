name: Update Daily Data (EOD)

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - "scripts/**"
      - "requirements.txt"
      - ".github/workflows/update-daily.yml"
      - ".github/workflows/update-intraday.yml"
  schedule:
    - cron: "15 * * * *"

permissions:
  contents: write

concurrency:
  group: update-daily
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "requirements.txt"

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Gate — run only after US market close (ET)
        id: gate
        shell: bash
        run: |
          python - <<'PY'
          import datetime, sys
          from zoneinfo import ZoneInfo
          et = ZoneInfo("America/New_York")
          now = datetime.datetime.now(tz=et)
          run = False
          # Weekend: allow anytime
          if now.weekday() >= 5:
              run = True
          # Weekday: allow after 16:15 ET
          elif (now.hour, now.minute) >= (16, 15):
              run = True
          print(f"gate_run={run} now_et={now.isoformat()}")
          # write output
          with open(sys.argv[1], "a", encoding="utf-8") as f:
              f.write(f"run={'true' if run else 'false'}\n")
          PY "$GITHUB_OUTPUT"

      - name: Stop if gated
        if: steps.gate.outputs.run != 'true'
        run: echo "Gated. Skipping update." && exit 0

      - name: Build daily_latest.json (+ periods)
        run: node scripts/fetch_daily.js

      - name: Build calendar.json (NYSE)
        run: python scripts/update_calendar.py

      - name: Merge latest.json
        run: python scripts/update_latest.py

      - name: Publish data to data branch
        shell: bash
        run: |
          set -euo pipefail
          # keep working tree clean before switching branches
          git clean -fdx

          git fetch origin data || true
          if git show-ref --verify --quiet refs/remotes/origin/data; then
            git checkout -B data origin/data
          else
            git checkout --orphan data
            git rm -rf . || true
          fi

          mkdir -p public/data
          git checkout main -- public/data || true
          # copy generated files from main workspace
          git checkout main -- public/data/daily_latest.json public/data/period_20d.json public/data/period_60d.json public/data/period_252d.json public/data/calendar.json public/data/latest.json || true

          git add public/data/daily_latest.json public/data/period_20d.json public/data/period_60d.json public/data/period_252d.json public/data/calendar.json public/data/latest.json
          git diff --cached --quiet || git commit -m "data: update daily/period/calendar/latest [skip ci]"
          git push origin data
