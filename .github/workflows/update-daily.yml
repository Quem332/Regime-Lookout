name: Update Daily Data (EOD)

on:
  workflow_dispatch:
    inputs:
      force:
        description: 'Run even if before market close (for debugging)'
        required: false
        default: 'false'
  schedule:
    - cron: '15 * * * *'

permissions:
  contents: write

concurrency:
  group: update-daily
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'requirements.txt'

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Gate: decide whether to run (ET)
        id: gate
        shell: bash
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import datetime
          from zoneinfo import ZoneInfo

          force = ("${{ github.event.inputs.force }}" or "false").lower() == "true"
          et = ZoneInfo("America/New_York")
          now = datetime.datetime.now(tz=et)

          run = True
          reason = "ok"

          if not force:
            # Weekend: allow any time
            if now.weekday() >= 5:
              run = True
              reason = "weekend"
            else:
              # Weekday: allow after 16:15 ET
              if (now.hour, now.minute) >= (16, 15):
                run = True
                reason = "after_close"
              else:
                run = False
                reason = "before_close"

          print(f"run={'true' if run else 'false'}")
          print(f"reason={reason}")
          PY

      - name: Stop if gated
        if: steps.gate.outputs.run != 'true'
        run: |
          echo "Gated: ${{ steps.gate.outputs.reason }}"
          exit 0

      - name: Build daily outputs
        run: node scripts/fetch_daily.js

      - name: Publish daily outputs to data branch
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          rm -rf _data_branch
          mkdir -p _data_branch

          git fetch origin data || true
          if git show-ref --verify --quiet refs/remotes/origin/data; then
            git clone --depth 1 --branch data "https://github.com/${GITHUB_REPOSITORY}.git" _data_branch
          else
            git clone --depth 1 "https://github.com/${GITHUB_REPOSITORY}.git" _data_branch
            (cd _data_branch && git checkout --orphan data && git rm -rf . || true)
          fi

          mkdir -p _data_branch/public/data

          # Copy whatever exists (daily, period, calendar)
          for f in daily_latest.json period_20d.json period_60d.json period_252d.json latest.json calendar.json; do
            if [ -f "public/data/$f" ]; then
              cp -f "public/data/$f" "_data_branch/public/data/$f"
            fi
          done

          (cd _data_branch && \
            git add public/data && \
            git diff --cached --quiet || git commit -m "data(daily): refresh daily outputs [skip ci]")

          (cd _data_branch && git push origin data)
