name: Update Daily Data (EOD)

on:
  workflow_dispatch:
  schedule:
    # Hourly; gate below will skip before close.
    - cron: "15 * * * *"

permissions:
  contents: write

concurrency:
  group: update-daily
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "requirements.txt"

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Gate: run only after US market close (ET)
        id: gate
        continue-on-error: true
        shell: bash
        run: |
          python - <<'PY'
          import datetime, sys
          from zoneinfo import ZoneInfo
          et = ZoneInfo("America/New_York")
          now = datetime.datetime.now(tz=et)
          if now.weekday() >= 5:
              print("Weekend -> run")
              sys.exit(0)
          if (now.hour, now.minute) >= (16, 15):
              print("After close -> run")
              sys.exit(0)
          print("Before close -> skip")
          sys.exit(2)
          PY

      - name: Stop if gated
        if: steps.gate.outcome != 'success'
        run: echo "Gated. Skipping update." && exit 0

      - name: Build daily_latest.json
        run: node scripts/fetch_daily.js

      - name: Publish data to data branch
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p /tmp/mri-data
          cp -f public/data/daily_latest.json /tmp/mri-data/ || true
          cp -f public/data/latest.json /tmp/mri-data/ || true

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git fetch origin data || true
          if git show-ref --verify --quiet refs/remotes/origin/data; then
            git checkout -B data origin/data
          else
            git checkout --orphan data
            git rm -rf . || true
          fi

          mkdir -p public/data
          cp -f /tmp/mri-data/*.json public/data/ || true

          git add public/data/*.json
          git diff --cached --quiet && echo "No data changes" && exit 0
          git commit -m "data(daily): refresh daily_latest.json [skip ci]"
          git push -u origin data
