name: Update Daily Data (EOD)

on:
  workflow_dispatch:
    inputs:
      force:
        description: 'Run even if market is open (for debugging)'
        required: false
        default: 'false'
  # When you push script/workflow changes, do one immediate refresh.
  push:
    branches: [ main ]
    paths:
      - 'scripts/**'
      - 'requirements.txt'
      - '.github/workflows/update-daily.yml'
  schedule:
    # Hourly; gate below will skip before close.
    - cron: '15 * * * *'

permissions:
  contents: write

concurrency:
  group: update-daily
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      FORCE_RUN: ${{ github.event_name == 'push' && '1' || '0' }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'requirements.txt'

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: "Gate: decide whether to run (ET)"
        id: gate
        shell: bash
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import datetime
          import os
          from zoneinfo import ZoneInfo

          et = ZoneInfo("America/New_York")
          now = datetime.datetime.now(tz=et)

          force = ("${{ github.event.inputs.force }}" or "false").lower() == "true"

          if os.environ.get("FORCE_RUN") == "1":
            print("run=1")
            print("reason=forced_by_push")
            raise SystemExit(0)

          run = True
          reason = "ok"

          if not force:
            # Weekend: allow update any time
            if now.weekday() >= 5:
              run = True
              reason = "weekend"
            else:
              # Weekday: allow after 16:15 ET
              if (now.hour, now.minute) >= (16, 15):
                run = True
                reason = "after_close"
              else:
                run = False
                reason = "before_close"

          print(f"run={1 if run else 0}")
          print(f"reason={reason}")
          PY

      - name: Stop if gated
        if: steps.gate.outputs.run != '1'
        run: echo "Gated (${{ steps.gate.outputs.reason }}). Skipping update." && exit 0

      - name: Build daily_latest.json
        run: node scripts/fetch_daily.js

      - name: Publish daily to data branch
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          rm -rf _data_branch
          git clone --depth 1 --branch data "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" _data_branch

          (cd _data_branch && git config user.name "github-actions[bot]")
          (cd _data_branch && git config user.email "41898282+github-actions[bot]@users.noreply.github.com")

          mkdir -p _data_branch/public/data
          cp -f public/data/daily_latest.json _data_branch/public/data/daily_latest.json

          cd _data_branch
          git add public/data/daily_latest.json
          if ! git diff --cached --quiet; then
            git commit -m "data(daily): refresh daily_latest.json [skip ci]"
            git push origin data
          else
            echo "No changes to commit."
          fi
