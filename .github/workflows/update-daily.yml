name: Update Daily Data (EOD)

on:
  workflow_dispatch:
  schedule:
    - cron: '15 * * * *'
  push:
    branches: [ main ]
    paths:
      - 'scripts/**'
      - '.github/workflows/update-daily.yml'

permissions:
  contents: write

concurrency:
  group: update-daily
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: "Gate: skip unless after US market close (ET)"
        id: gate
        continue-on-error: true
        shell: bash
        run: |
          python - <<'PY'
          import datetime
          from zoneinfo import ZoneInfo
          et = ZoneInfo("America/New_York")
          now = datetime.datetime.now(tz=et)

          if now.weekday() >= 5:
              raise SystemExit(0)

          if (now.hour, now.minute) >= (16, 15):
              raise SystemExit(0)

          raise SystemExit(2)
          PY

      - name: "Stop if gated"
        if: steps.gate.outcome != 'success'
        run: echo "Gated. Skipping update." && exit 0

      - name: Build daily_latest.json
        run: node scripts/fetch_daily.js

      - name: "Commit & push"
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/daily_latest.json
          git diff --cached --quiet || git commit -m "data(daily): refresh daily_latest.json"
          git push
