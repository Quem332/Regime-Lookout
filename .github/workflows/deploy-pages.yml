name: Deploy Regime-Lookout to GitHub Pages

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # 🔥 npm production 설정 완전 제거
      - name: Fix npm config
        run: |
          npm config delete production || true
          npm config set registry https://registry.npmjs.org/

      - name: Install
        run: npm install

      - name: Build
        run: npx vite build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/deploy-pages@v4
