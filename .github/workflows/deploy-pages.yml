name: Deploy Regime-Lookout to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      # ⭐ npm10 버그 회피
      - name: Downgrade npm to stable v9
        run: |
          npm -v
          npm ci -g npm@9
          npm -v

      # ⭐ npm 설정 초기화
      - name: Reset npm config
        run: |
          npm config delete production || true
          npm config delete omit || true
          npm config delete only || true
          npm config set registry https://registry.npmjs.org/

      # ⭐ devDependencies 포함 설치
      - name: Install deps
        run: npm ci --no-audit --no-fund

      - name: Build
        run: npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/deploy-pages@v4
