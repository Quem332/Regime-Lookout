name: Update Intraday Data (Market Hours)

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - "scripts/**"
      - "requirements.txt"
      - ".github/workflows/update-intraday.yml"
  schedule:
    - cron: "*/5 * * * *"

permissions:
  contents: write

concurrency:
  group: update-intraday
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "requirements.txt"

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Gate — run only during US regular market hours (ET)
        id: gate
        shell: bash
        run: |
          python - <<'PY'
          import datetime, sys
          from zoneinfo import ZoneInfo
          et = ZoneInfo("America/New_York")
          now = datetime.datetime.now(tz=et)
          run = True
          if now.weekday() >= 5:
              run = False
          else:
              mins = now.hour * 60 + now.minute
              if mins < (9 * 60 + 30) or mins > (16 * 60):
                  run = False
          print(f"gate_run={run} now_et={now.isoformat()}")
          with open(sys.argv[1], "a", encoding="utf-8") as f:
              f.write(f"run={'true' if run else 'false'}\n")
          PY "$GITHUB_OUTPUT"

      - name: Stop if gated
        if: steps.gate.outputs.run != 'true'
        run: echo "Gated. Skipping update." && exit 0

      - name: Build intraday_latest.json
        run: node scripts/fetch_intraday.js

      - name: Merge latest.json
        run: python scripts/update_latest.py

      - name: Publish data to data branch
        shell: bash
        run: |
          set -euo pipefail
          git clean -fdx

          git fetch origin data || true
          if git show-ref --verify --quiet refs/remotes/origin/data; then
            git checkout -B data origin/data
          else
            git checkout --orphan data
            git rm -rf . || true
          fi

          mkdir -p public/data
          git checkout main -- public/data || true
          git checkout main -- public/data/intraday_latest.json public/data/latest.json || true

          git add public/data/intraday_latest.json public/data/latest.json
          git diff --cached --quiet || git commit -m "data: update intraday/latest [skip ci]"
          git push origin data
