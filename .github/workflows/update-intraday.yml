name: Update Intraday Data (Market Hours)

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

permissions:
  contents: write

concurrency:
  group: update-intraday
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "requirements.txt"

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: "Gate — run only during US regular market hours (ET)"
        id: gate
        shell: bash
        run: |
          python - <<'PY'
          import os, datetime
          from zoneinfo import ZoneInfo
          et = ZoneInfo("America/New_York")
          now = datetime.datetime.now(tz=et)
          run = 1
          if now.weekday() >= 5:
              run = 0
          else:
              mins = now.hour * 60 + now.minute
              if mins < (9 * 60 + 30) or mins > (16 * 60):
                  run = 0
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as f:
              f.write(f"run={run}\n")
          print(f"[gate] run={run} now_et={now.isoformat()}")
          PY

      - name: Stop if gated
        if: steps.gate.outputs.run != '1'
        run: echo "Gated. Skipping update." && exit 0
      - name: Build intraday_latest.json
        run: node scripts/fetch_intraday.js

      - name: Publish data to data branch
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p /tmp/mri-data
          cp -f public/data/intraday_latest.json /tmp/mri-data/ || true
          git reset --hard
          git clean -fdx
          cp -f public/data/latest.json /tmp/mri-data/ || true

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git fetch origin data || true
          if git show-ref --verify --quiet refs/remotes/origin/data; then
            git checkout -B data origin/data
          else
            git checkout --orphan data
            git rm -rf . || true
          fi

          mkdir -p public/data
          cp -f /tmp/mri-data/*.json public/data/ || true

          git add public/data/*.json
          git diff --cached --quiet && echo "No data changes" && exit 0
          git commit -m "data(intraday): refresh intraday_latest.json [skip ci]"
          git push -u origin data
