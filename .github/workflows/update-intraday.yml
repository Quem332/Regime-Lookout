name: Update Intraday Data (Market Hours)

on:
  workflow_dispatch:
  schedule:
    # Every 5 minutes. Script remains cheap; market-hours gating below.
    - cron: '*/5 * * * *'

permissions:
  contents: write

concurrency:
  group: update-intraday
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'requirements.txt'

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Gate: run only during US regular market hours (ET)
        run: |
          python - <<'PY'
          import datetime
          from zoneinfo import ZoneInfo
          et = ZoneInfo('America/New_York')
          now = datetime.datetime.now(tz=et)
          # Skip weekends
          if now.weekday() >= 5:
              print('Weekend -> skip')
              raise SystemExit(2)
          # Regular hours 09:30-16:00 ET
          mins = now.hour*60 + now.minute
          if mins < (9*60+30) or mins > (16*60):
              print('Outside regular hours -> skip')
              raise SystemExit(2)
          print('Market hours -> run')
          PY
        continue-on-error: true

      - name: Build intraday_latest.json
        run: node scripts/fetch_intraday.js

      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/intraday_latest.json
          git diff --cached --quiet || git commit -m "data(intraday): refresh intraday_latest.json"
          git push
