name: Update Intraday Data (Market Hours)

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"
  push:
    branches: [ main ]
    paths:
      - "scripts/**"
      - "requirements.txt"
      - ".github/workflows/update-intraday.yml"

permissions:
  contents: write

concurrency:
  group: update-intraday
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "requirements.txt"

      - name: Install Node deps
        run: npm ci

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: "Gate: run only during US regular market hours (ET)"
        id: gate
        shell: bash
        run: |
          python - <<'PY'
          import datetime, os
          from zoneinfo import ZoneInfo

          et = ZoneInfo("America/New_York")
          now = datetime.datetime.now(tz=et)

          run = False
          if now.weekday() < 5:
              mins = now.hour * 60 + now.minute
              if (9 * 60 + 30) <= mins <= (16 * 60):
                  run = True

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as f:
              f.write(f"run={'true' if run else 'false'}\n")

          print(f"[gate] now_et={now.isoformat()} run={run}")
          PY

      - name: Stop if gated
        if: steps.gate.outputs.run != 'true'
        run: echo "Gated. Skipping update." && exit 0

      - name: Build intraday_latest.json
        run: node scripts/fetch_intraday.js

      - name: Publish to data branch (no deploy loop)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          # Clone data branch in a separate workspace to avoid touching main
          rm -rf _data_branch
          if git ls-remote --exit-code --heads "https://github.com/${GITHUB_REPOSITORY}.git" data >/dev/null 2>&1; then
            git clone --depth 1 --branch data "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" _data_branch
          else
            git clone --depth 1 "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" _data_branch
            cd _data_branch
            git checkout --orphan data
            find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
            cd ..
          fi

          cd _data_branch
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          cd ..

          mkdir -p _data_branch/public/data
          cp -f public/data/intraday_latest.json _data_branch/public/data/intraday_latest.json

          cd _data_branch
          git add public/data/intraday_latest.json
          git diff --cached --quiet || git commit -m "data(intraday): refresh intraday_latest.json [skip ci]"
          git push origin data