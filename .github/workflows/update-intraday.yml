name: Update Intraday Data (Market Hours)

on:
  workflow_dispatch:
  schedule:
    - cron: '*/5 * * * *'

permissions:
  contents: write

concurrency:
  group: update-intraday
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'requirements.txt'

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Gate: run only during US regular market hours (ET)
        id: gate
        continue-on-error: true
        run: |
          python -c "import datetime; from zoneinfo import ZoneInfo; et=ZoneInfo('America/New_York'); now=datetime.datetime.now(tz=et);               import sys;               (sys.exit(2) if now.weekday()>=5 else None);               mins=now.hour*60+now.minute;               (sys.exit(2) if (mins < (9*60+30) or mins > (16*60)) else None);               sys.exit(0)"

      - name: Stop if gated
        if: steps.gate.outcome != 'success'
        run: echo "Gated. Skipping update." && exit 0

      - name: Build intraday_latest.json
        run: node scripts/fetch_intraday.js

      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/intraday_latest.json
          git diff --cached --quiet || git commit -m "data(intraday): refresh intraday_latest.json"
          git push
