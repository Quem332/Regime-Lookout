name: Rebuild latest.json (Manual)

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: rebuild-latest
  cancel-in-progress: true

jobs:
  rebuild:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "requirements.txt"

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Merge latest.json (from existing public/data/*)
        run: python scripts/update_latest.py

      - name: Publish latest.json to data branch
        shell: bash
        run: |
          set -euo pipefail
          git clean -fdx
          git fetch origin data || true
          if git show-ref --verify --quiet refs/remotes/origin/data; then
            git checkout -B data origin/data
          else
            git checkout --orphan data
            git rm -rf . || true
          fi
          mkdir -p public/data
          git checkout main -- public/data/latest.json || true
          git add public/data/latest.json
          git diff --cached --quiet || git commit -m "data: rebuild latest.json [skip ci]"
          git push origin data
