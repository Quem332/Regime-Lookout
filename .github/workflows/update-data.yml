name: Update MRI Data

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install yfinance pandas numpy

      - name: Run MRI Update
        run: python scripts/update_latest.py

      - name: Commit if changed
        run: |
          git config user.name "mri-bot"
          git config user.email "bot@users.noreply.github.com"
          git add public/data/latest.json public/data/calendar.json
          git commit -m "auto update MRI data" || echo "no change"
          git push