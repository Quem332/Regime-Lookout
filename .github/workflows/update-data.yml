name: Update All Data (Manual)

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-all-data
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'requirements.txt'

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build daily outputs
        run: node scripts/fetch_daily.js

      - name: Build intraday output
        run: node scripts/fetch_intraday.js

      - name: Publish all outputs to data branch
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          rm -rf _data_branch
          mkdir -p _data_branch

          git clone --depth 1 --branch data "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" _data_branch

          (cd _data_branch && git config user.name "github-actions[bot]")
          (cd _data_branch && git config user.email "41898282+github-actions[bot]@users.noreply.github.com")

          mkdir -p _data_branch/public/data
          cp -f public/data/*.json _data_branch/public/data/ 2>/dev/null || true

          (cd _data_branch && git add public/data)
          (cd _data_branch && \
            if ! git diff --cached --quiet; then \
              git commit -m "data: refresh all outputs [skip ci]"; \
              git push origin data; \
            else \
              echo "No changes to commit."; \
            fi)
