name: Update MRI Data (latest.json)

on:
  workflow_dispatch: {}
permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'requirements.txt'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Update latest.json
        run: |
          python scripts/update_latest.py

      - name: Commit & push if changed
        run: |
          git config user.name "mri-bot"
          git config user.email "mri-bot@users.noreply.github.com"
          git add public/data/latest.json
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "data: update latest.json"
          git push
