name: Update MRI Data (latest.json)

on:
  schedule:
    # Run every 15 minutes; script writes only at :00/:30 (+10m delay) or inside event windows.
    - cron: "*/15 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Update latest.json
        run: |
          python scripts/update_latest.py

      - name: Commit & push if changed
        run: |
          git config user.name "mri-bot"
          git config user.email "mri-bot@users.noreply.github.com"
          git add public/data/latest.json
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "data: update latest.json"
          git push
