name: Update All Data (Manual)

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: data-branch-publish
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'requirements.txt'

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build intraday_latest.json
        run: node scripts/fetch_intraday.js

      - name: Build daily_latest.json
        run: python scripts/update_daily.py

      - name: Publish all to data branch
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          rm -rf _data_branch
          git clone --depth 1 --branch data "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" _data_branch
          cd _data_branch

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          mkdir -p public/data
          cp -f ../public/data/intraday_latest.json public/data/intraday_latest.json
          cp -f ../public/data/daily_latest.json public/data/daily_latest.json

          git add public/data/intraday_latest.json public/data/daily_latest.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "data(all): refresh daily+intraday latest [skip ci]"

          for attempt in 1 2 3; do
            echo "Push attempt $attempt..."
            git fetch origin data --depth=50 || true
            git rebase origin/data || true
            if git push origin HEAD:data; then
              echo "Push succeeded."
              exit 0
            fi
            echo "Push rejected; retrying..."
            sleep $((attempt*2))
          done

          echo "Push failed after retries."
          exit 1
